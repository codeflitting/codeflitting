{% load static %}
{% load compress %}
<!DOCTYPE html>
<html lang="zh-ch">
<head>
    <title>{% block title %}Codeflitting{% endblock %}</title>
    <!-- Required meta tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="keywords" content="{% block keywords %}codeflitting,代码搬运工{% endblock %}"/>
    <meta name="description" content="{% block descrip %}codeflitting{% endblock %}"/>
    <!-- Bootstrap CSS -->
    {% block css %}
        <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.bootcss.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
        <link href="{% static 'css/hover-min.css' %}" crossorigin="anonymous" rel="stylesheet">
        {% compress css %}
            <link href="{% static 'css/base.scss' %}" type="text/x-scss" rel="stylesheet"/>
            <link href="{% static 'css/html-units.scss' %}" type="text/x-scss" rel="stylesheet"/>
        {% endcompress %}
    {% endblock %}
</head>
<body>
{% block content %}{% endblock %}

{% block js %}
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
{% endblock %}
<!-- Global site tag (gtag.js) - Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=UA-117102583-1"></script>
<script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
        dataLayer.push(arguments);
    }

    gtag('js', new Date());
    gtag('config', 'UA-117102583-1');
</script>

</body>
</html>
